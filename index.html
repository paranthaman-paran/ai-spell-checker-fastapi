<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spelling & Grammar Check</title>
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 800px;
            padding: 2rem;
        }

        .card {
            background: var(--card-bg);
            border-radius: 1rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            padding: 2rem;
        }

        h1 {
            margin-top: 0;
            color: var(--primary);
            text-align: center;
            font-size: 2rem;
        }

        .input-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--text-main);
        }

        textarea {
            width: 100%;
            height: 150px;
            padding: 1rem;
            border: 2px solid var(--border);
            border-radius: 0.5rem;
            font-size: 1rem;
            font-family: inherit;
            resize: vertical;
            transition: border-color 0.2s;
            box-sizing: border-box; 
        }

        textarea:focus {
            outline: none;
            border-color: var(--primary);
        }

        button {
            background-color: var(--primary);
            color: white;
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 0.5rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        button:disabled {
            background-color: var(--text-muted);
            cursor: not-allowed;
        }

        .result-area {
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 1px solid var(--border);
            display: none;
        }

        .result-group {
            margin-bottom: 1.5rem;
        }

        .corrected-text {
            background-color: #f0fdf4;
            padding: 1rem;
            border-radius: 0.5rem;
            border: 1px solid #bbf7d0;
            color: #166534;
        }

        .changes-list {
            list-style-type: disc;
            padding-left: 1.5rem;
            color: var(--text-muted);
        }
        
        .loading {
            text-align: center;
            display: none;
            color: var(--text-muted);
            margin-top: 1rem;
        }

    </style>
</head>
<body>

    <div class="container">
        <div class="card">
            <h1>✨ Spelling & Grammar Check</h1>
            
            <div class="input-group">
                <label for="inputText">Enter your text:</label>
                <textarea id="inputText" placeholder="Type or paste your text here (e.g., 'Thiss is a tst')..."></textarea>
            </div>

            <button id="checkBtn" onclick="checkSpelling()">Check Text</button>
            <div id="loading" class="loading">Analyzing...</div>

            <div id="resultArea" class="result-area">
                <div class="result-group">
                    <label>Corrected Text:</label>
                    <div id="correctedText" class="corrected-text"></div>
                </div>
                
                <div class="result-group">
                    <label>Changes Made:</label>
                    <ul id="changesList" class="changes-list"></ul>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function checkSpelling() {
            const text = document.getElementById('inputText').value;
            if (!text.trim()) return;

            const btn = document.getElementById('checkBtn');
            const loading = document.getElementById('loading');
            const resultArea = document.getElementById('resultArea');
            
            btn.disabled = true;
            loading.style.display = 'block';
            resultArea.style.display = 'none';

            try {
                const response = await fetch('/check', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ text: text }),
                });

                if (!response.ok) {
                    throw new Error('Network response was not ok');
                }

                const data = await response.json();
                
                document.getElementById('correctedText').innerText = data.corrected_text;
                
                const changesList = document.getElementById('changesList');
                changesList.innerHTML = '';
                if (data.changes && data.changes.length > 0) {
                    data.changes.forEach(change => {
                        const li = document.createElement('li');
                        li.innerText = change;
                        changesList.appendChild(li);
                    });
                } else {
                    const li = document.createElement('li');
                    li.innerText = "No changes needed.";
                    changesList.appendChild(li);
                }

                resultArea.style.display = 'block';

            } catch (error) {
                console.error('Error:', error);
                alert('An error occurred. Please try again.');
            } finally {
                btn.disabled = false;
                loading.style.display = 'none';
            }
        }
    </script>
</body>
</html>
